name: Release Build

# 觸發:push 任何 v* tag(例如 v0.3.0-beta2、v1.0.0)
# 在 windows-latest + macos-latest 跑 build,artifact 自動 attach 到對應 release
on:
  push:
    tags:
      - 'v*'

# 給 GITHUB_TOKEN 寫 release 的權限(預設只有 read)
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Sync package.json version with git tag
        working-directory: app
        shell: bash
        run: |
          # 把 v0.3.0-beta3 → 0.3.0-beta3,寫進 package.json
          # electron-builder 從 package.json 讀 version,filename 跟著對齊
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='$VERSION';fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n');"
          echo "Synced package.json version to $VERSION"
          cat package.json | grep version

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build web bundle (esbuild + Tailwind + pdf worker)
        working-directory: app
        run: npm run build:web

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: app
        env:
          # 不簽名(沒買 cert);electron-builder 會自動嵌 icon
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # --publish never:package.json 有 publish config(讓 electron-updater 找 latest.yml),
        # 但 build 時不要 try publish(會要 GH_TOKEN)。upload 由下面的 action-gh-release 統一處理
        run: npx electron-builder --win --publish never

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --publish never

      - name: List artifacts
        working-directory: app
        shell: bash
        run: ls -la dist/

      # Release notes body — 把 user 第一眼看到的「請選你的平台」3 個直連結
      # 釘在最上面,把 13 個 asset list 的視覺噪音壓下去。Win + Mac runner
      # 都產同一份 body(softprops/action-gh-release 對既有 release 是 PATCH,
      # 後寫者覆蓋同樣內容,結果 idempotent)
      - name: Generate release body
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          cat > release_body.md <<EOF
          ## ⬇️ 下載 / Download

          選你的平台 — 一個檔案就好。其他檔案是給 app 內自動更新流程用的,**不用手動下載**。

          | 平台 | 點這個 |
          |---|---|
          | 🪟 **Windows** | **[Arena-Card-Generator-Setup-${VERSION}.exe](${BASE}/Arena-Card-Generator-Setup-${VERSION}.exe)** |
          | 🍎 **Mac** · Apple Silicon (M1/M2/M3/M4) | **[Arena-Card-Generator-${VERSION}-arm64.dmg](${BASE}/Arena-Card-Generator-${VERSION}-arm64.dmg)** |
          | 🍎 **Mac** · Intel | **[Arena-Card-Generator-${VERSION}-x64.dmg](${BASE}/Arena-Card-Generator-${VERSION}-x64.dmg)** |

          > ⚠️ 第一次打開的安全警告(Windows SmartScreen / macOS Gatekeeper)→ 看 [README 安裝說明](https://github.com/${REPO}/blob/${TAG}/README.md#安裝)

          <details><summary>📦 其他檔案是什麼?</summary>

          | 檔案 | 用途 |
          |---|---|
          | \`Arena-Card-Generator-${VERSION}-x64.exe\` | Windows portable(免安裝、解壓即用,進階 user 用) |
          | \`*-arm64.zip\` / \`*-x64.zip\` | macOS 自動更新走的 in-place replace 包(app 自己抓) |
          | \`*.blockmap\` | electron-updater delta update 用 |
          | \`latest.yml\` / \`latest-mac.yml\` | electron-updater 找新版的 manifest |

          這些檔案 user 不用手動下載 — app 內自動更新會處理。

          </details>

          ---

          完整改動見 [CHANGELOG.md](https://github.com/${REPO}/blob/${TAG}/CHANGELOG.md)。
          EOF
          echo "---- release_body.md ----"
          cat release_body.md

      - name: Upload to GitHub Release
        # 釘 SHA 而不是 @v2:third-party action,維護者帳號被駭可能 push
        # 惡意 v2(mutable tag),CI 下次跑就中招。SHA 釘版可避免。
        # 升級時:看 https://github.com/softprops/action-gh-release/releases
        # 確認新 release notes 後換 SHA + 在這條 comment 旁邊註記版本
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2 (2026-01-xx)
        with:
          # 自動 match 觸發的 tag
          files: |
            app/dist/*.exe
            app/dist/*.zip
            app/dist/*.dmg
            app/dist/*.blockmap
            app/dist/latest*.yml
          fail_on_unmatched_files: false
          body_path: release_body.md
          # 永遠不標 prerelease + 一律 latest。原因:electron-updater 走
          # GitHub /releases/latest API,該 endpoint 只回 isPrerelease=false
          # 的 Latest release。我們的 betaN 是 release name convention,
          # 不是「未公開」狀態,故一律標 stable + Latest,讓 auto-update 通
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
