<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Card Generator</title>
  <!-- CSP:只允許 self 來源的 script(local bundle),禁絕任何外部 / inline script
       style 允許 inline(Tailwind 跟 React 動態 style 需要)+ Google Fonts
       font 允許 Google Fonts gstatic
       img / connect 開放(localStorage、blob URL、Gemini API、GitHub releases API、Google Fonts) -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: blob:;
    connect-src 'self' https://api.github.com https://generativelanguage.googleapis.com https://fonts.googleapis.com https://fonts.gstatic.com;
    worker-src 'self' blob:;
    object-src 'none';
    base-uri 'self';
  " />
  <link rel="stylesheet" href="dist/tailwind.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@500;700;900&family=Noto+Sans+SC:wght@500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Inter', 'Noto Sans TC', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background: #050505;
      color: #ececec;
      overflow: hidden;
    }
    .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    /* 卡片內字體:Noto Sans TC + SC 900 黑體前置,繁簡中英都粗 */
    .card-font {
      font-family: 'Inter', 'Noto Sans TC', 'Noto Sans SC', 'Microsoft JhengHei', 'Microsoft YaHei', 'PingFang TC', 'PingFang SC', 'Heiti TC', 'Heiti SC', sans-serif;
    }
    .card-tex {
      background:
        radial-gradient(ellipse at 80% 10%, rgba(255,255,255,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 90%, rgba(255,255,255,0.04) 0%, transparent 50%),
        linear-gradient(135deg, #0c0c0d 0%, #15151a 50%, #0a0a0c 100%);
    }
    .card-tex-checker {
      background-image:
        linear-gradient(45deg, #2a2a30 25%, transparent 25%),
        linear-gradient(-45deg, #2a2a30 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #2a2a30 75%),
        linear-gradient(-45deg, transparent 75%, #2a2a30 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: #1a1a20;
    }
    /* 主題強調色:熒光綠 #00ff66 */
    .glow-pink { box-shadow: 0 0 0 2px #00ff66, 0 0 30px rgba(0,255,102,0.55); }
    .glow-pink-soft { box-shadow: 0 0 25px rgba(0,255,102,0.3); }
    .card-container { container-type: inline-size; }
    .scrollbar-pretty::-webkit-scrollbar { width: 10px; }
    .scrollbar-pretty::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-pretty::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 5px; }
    .scrollbar-pretty::-webkit-scrollbar-thumb:hover { background: #3a3a40; }

    /* line numbers gutter */
    .lineno {
      position: absolute; left: 0; top: 0; bottom: 0; width: 44px;
      padding: 1rem 0;
      text-align: right; padding-right: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: #4a4a52; user-select: none;
      pointer-events: none;
      line-height: 1.5rem;
    }
    .editor-area {
      padding-left: 56px; padding-right: 12px; padding-top: 1rem; padding-bottom: 1rem;
      line-height: 1.5rem;
      /* 不換行,長行被遮掉(右邊有 fade mask 提示),序號才對得上邏輯行 */
      white-space: pre;
      overflow-x: auto;
      overflow-y: auto;
    }
    /* 隱藏水平 scrollbar 但保留滾動行為(cursor 移過去仍會跟) */
    .editor-area::-webkit-scrollbar:horizontal { height: 0; display: none; }
    /* 右邊 fade,模擬 ellipsis 視覺提示 */
    .editor-wrap {
      position: relative;
    }
    .editor-wrap::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; right: 0;
      width: 36px;
      background: linear-gradient(to right, rgba(11, 11, 14, 0), rgba(11, 11, 14, 0.95));
      pointer-events: none;
    }
    /* 拖曳 column divider */
    .col-divider {
      cursor: col-resize;
      width: 6px;
      flex-shrink: 0;
      position: relative;
      transition: background 120ms ease;
    }
    .col-divider::before {
      content: '';
      position: absolute; top: 0; bottom: 0; left: 50%; width: 2px;
      transform: translateX(-1px);
      background: rgba(0,255,102,0);
      transition: background 120ms ease;
    }
    .col-divider:hover::before, .col-divider.dragging::before {
      background: rgba(0,255,102,0.7);
    }
    .col-divider.dragging { background: rgba(0,255,102,0.08); }

    /* keyboard kbd */
    kbd {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 2px 6px;
      background: #1a1a20; border: 1px solid #2a2a30;
      border-radius: 4px; color: #aaa;
    }

    /* fade-in for cards */
    .card-enter {
      animation: cardIn 200ms ease-out;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="dist/bundle.js"></script>
</body>
</html>
